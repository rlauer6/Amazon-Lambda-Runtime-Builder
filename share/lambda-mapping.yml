version: 1.4

# trigger.type values this version of lambda-mapping.yml understands.
# generate-yaml/init() validate lambda.yaml's trigger.type against this
# list and error clearly if it names a pattern not yet supported.
trigger_types:
  - s3-sqs
  - s3-direct
  - eventbridge
  - sns
  - alb

mapping:
  - yaml: image.repo
    env: REPO_NAME
    default: perl-lambda

  - yaml: image.handler
    env: HANDLER_CLASS
    required: true

  - yaml: lambda.name
    env: FUNCTION_NAME
    default: lambda-handler

  - yaml: lambda.timeout
    env: TIMEOUT
    default: 30

  - yaml: lambda.memory
    env: MEMORY
    default: 128

  - yaml: lambda.concurrency
    env: CONCURRENCY
    default: 1

  - yaml: role.name
    env: ROLE_NAME
    default: lambda-role

  - yaml: role.profile
    env: ROLE_PROFILE

  - yaml: trigger.type
    env: TRIGGER_TYPE
    required: true

  - yaml: overlay
    env: OVERLAY

  - yaml: platform_image
    env: PLATFORM_IMAGE

  - yaml: log_retention
    env: LOG_RETENTION
    default: 1

  - yaml: trigger.bucket
    env: BUCKET_NAME
    required: true
    applies_to:
      - s3-sqs
      - s3-direct

  - yaml: trigger.prefix
    env: KEY_PREFIX
    applies_to:
      - s3-sqs
      - s3-direct

  - yaml: trigger.event
    env: S3_EVENT
    default: 's3:ObjectCreated:*'
    applies_to:
      - s3-sqs
      - s3-direct

  - yaml: trigger.queue.name
    env: QUEUE_NAME
    default: lambda-runtime
    applies_to:
      - s3-sqs

  - yaml: trigger.queue.batch_size
    env: BATCH_SIZE
    default: 1
    applies_to:
      - s3-sqs

  - yaml: trigger.queue.visibility_timeout
    env: VISIBILITY_TIMEOUT
    default: 360
    applies_to:
      - s3-sqs

  - yaml: trigger.queue.retention
    env: RETENTION
    default: 86400
    applies_to:
      - s3-sqs

  - yaml: trigger.queue.receive_count
    env: RECEIVE_COUNT
    default: 3
    applies_to:
      - s3-sqs

  - yaml: trigger.queue.dlq.name
    env: DLQ_NAME
    applies_to:
      - s3-sqs

  - yaml: trigger.queue.dlq.retention
    env: DLQ_RETENTION
    default: 1209600
    applies_to: 
      - s3-sqs

  - yaml: trigger.queue.partial_batch_response
    env: PARTIAL_BATCH_RESPONSE
    default: false
    omit_if_false: true
    applies_to:
      - s3-sqs

  - yaml: trigger.schedule
    env: SCHEDULE_EXPRESSION
    default: 'rate(1 day)'
    applies_to:
      - eventbridge

  - yaml: trigger.rule_name
    env: RULE_NAME
    default: lambda-handler-rule
    applies_to:
      - eventbridge

  - yaml: trigger.topic_name
    env: TOPIC_NAME
    required: true
    applies_to:
      - sns

  - yaml: trigger.listener_arn
    env: LISTENER_ARN
    required: true
    applies_to:
      - alb

  - yaml: trigger.path
    env: ALB_PATH
    default: '/build'
    applies_to:
      - alb

  - yaml: trigger.priority
    env: RULE_PRIORITY
    default: 10
    applies_to:
      - alb
